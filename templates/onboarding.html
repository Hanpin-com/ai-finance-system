<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div class="navbar">
        <div class="brand">AI Finance System</div>
        <div class="nav-links">
            <a href="{{ url_for('home') }}">Dashboard</a>
            <a href="{{ url_for('add_expense') }}">Add Expense</a>
            <a href="{{ url_for('report') }}">Report</a>
            <a href="{{ url_for('onboarding') }}">Profile</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Financial Goal Onboarding</h1>
            <p>Tell us about your needs and goals first.</p>
        </div>

        <form method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <label for="monthly_income">Monthly Income</label>
                    <input type="number" step="0.01" id="monthly_income" name="monthly_income" required>
                </div>

                <div class="form-group">
                    <label for="fixed_expenses">Fixed Expenses</label>
                    <input type="number" step="0.01" id="fixed_expenses" name="fixed_expenses" required>
                </div>

                <div class="form-group">
                    <label for="saving_status">Currently Saving?</label>
                    <select id="saving_status" name="saving_status" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                        <option value="Sometimes">Sometimes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="main_goal">Main Financial Goal</label>
                    <select id="main_goal" name="main_goal" required>
                        <option value="Emergency Fund">Emergency Fund</option>
                        <option value="Control Daily Spending">Control Daily Spending</option>
                        <option value="Travel Fund">Travel Fund</option>
                        <option value="Tuition Savings">Tuition Savings</option>
                        <option value="Reduce Impulse Buying">Reduce Impulse Buying</option>
                        <option value="First Savings Goal">First Savings Goal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="goal_amount">Goal Amount</label>
                    <input type="number" step="0.01" id="goal_amount" name="goal_amount" required>
                </div>

                <div class="form-group">
                    <label for="goal_timeline">Goal Timeline</label>
                    <select id="goal_timeline" name="goal_timeline" required>
                        <option value="1 month">1 month</option>
                        <option value="3 months">3 months</option>
                        <option value="6 months">6 months</option>
                        <option value="12 months">12 months</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="pain_point">Main Pain Point</label>
                    <select id="pain_point" name="pain_point" required>
                        <option value="Impulse spending">Impulse spending</option>
                        <option value="Too much eating out">Too much eating out</option>
                        <option value="Don't know where money goes">Don't know where money goes</option>
                        <option value="No saving habit">No saving habit</option>
                        <option value="Overspending frequently">Overspending frequently</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="overspend_category">Which Category Is Hardest to Control?</label>
                    <select id="overspend_category" name="overspend_category" required>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Bills">Bills</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Health">Health</option>
                        <option value="Education">Education</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label for="advice_style">Advice Style</label>
                    <select id="advice_style" name="advice_style" required>
                        <option value="Supportive">Supportive</option>
                        <option value="Direct">Direct</option>
                        <option value="Data-driven">Data-driven</option>
                    </select>
                </div>
            </div>

            <button type="submit">Save Profile</button>
        </form>

        <div class="nav-links">
            <a href="{{ url_for('home') }}">Go to Dashboard</a>
        </div>
    </div>

</body>
</html>
